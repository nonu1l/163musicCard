name: Update NetEase Cloud Music

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync with remote
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin "$GITHUB_REF_NAME" || git rebase --abort

      - name: Generate SVG cards
        env:
          NETEASE_COOKIE: ${{ secrets.NETEASE_COOKIE }}
          MUSIC_U: ${{ secrets.MUSIC_U }}
        run: npm run generate-cards

      - name: Commit changes
        run: |
          git add cards/ data/listening-state.json README.md
          if ! git diff --cached --quiet; then
            git commit -m "Update NetEase Cloud Music recent music"
            git push
          fi
